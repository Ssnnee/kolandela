name: Bug Report
description: Report a bug in Kolandéla
type: 'bug'
body:

  - type: markdown
    attributes:
      value: |
        *Before reporting:*
        - Search [existing issues](https://github.com/ssnnee/kolandela/issues?q=is%3Aissue) (including [closed](https://github.com/ssnnee/kolandela/issues?q=is%3Aissue+is%3Aclosed)).
        - Include screenshots or a screen recording if the bug is visual.
        - Usage or "How to" questions will be closed — use [Discussions](https://github.com/ssnnee/kolandela/discussions) instead.
        - And please do not let us discuss with your AI, we have our own. So please, try to write it yourserf.
  - type: textarea
    attributes:
      label: "Problem"
      description: "Describe the bug concisely. Include logs, screenshots, or screen recordings."
    validations:
      required: true
  - type: textarea
    attributes:
      label: "Steps to reproduce"
      description: "List the exact steps to reproduce the bug."
      placeholder: |
        1. Open the app
        2. Navigate to ...
        3. Tap on ...
        4. See error
    validations:
      required: true
  - type: textarea
    attributes:
      label: "Expected behavior"
      description: "Describe the behavior you expect."
    validations:
      required: true

  - type: input
    attributes:
      label: "App version"
      description: "Version from app.json or package.json."
      placeholder: "0.0.1"
    validations:
      required: true
  - type: input
    attributes:
      label: "Device / Platform"
      description: "Device model and OS version."
      placeholder: "Samsung S23, Android 17"
    validations:
      required: true
  - type: input
    attributes:
      label: "Installation method"
      description: "How did you install the app?"
      placeholder: "Expo Go / development build / APK / TestFlight"
    validations:
      required: false
